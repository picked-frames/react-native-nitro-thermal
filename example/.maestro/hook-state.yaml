# Hook State Test
#
# Validates: useThermalState hook renders a valid thermal state
# Prerequisites: app installed on simulator/emulator

appId: ${APP_ID}
---
- launchApp

# Wait for app to finish loading (Metro bundling can be slow in CI)
- extendedWaitUntil:
    visible:
      id: "hook-card"
    timeout: 60000

# Hook should have rendered a thermal state value
- assertVisible:
    id: "hook-value"

- takeScreenshot: 01-hook-state
