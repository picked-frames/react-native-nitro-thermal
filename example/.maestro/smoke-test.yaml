# Smoke Test — Thermal Monitor Example
#
# Validates: app launches, UI renders, both cards visible
# Prerequisites: app installed on simulator/emulator

appId: ${APP_ID}
---
- launchApp

# Wait for app to finish loading (Metro bundling can be slow in CI)
- extendedWaitUntil:
    visible: "Thermal Monitor"
    timeout: 60000

# Verify app renders
- assertVisible: "react-native-nitro-thermal"

# Verify both cards are present
- assertVisible:
    id: "poll-card"
- assertVisible:
    id: "hook-card"

# Hook card should show a thermal state value
- assertVisible:
    id: "hook-value"

- takeScreenshot: 01-initial-state
