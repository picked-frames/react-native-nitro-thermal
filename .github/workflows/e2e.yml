name: E2E Tests

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  maestro-ios:
    name: Maestro (iOS)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bun --cwd packages/react-native-nitro-thermal run typescript

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('example/ios/Podfile.lock') }}

      - name: Install Pods
        run: cd example/ios && pod install

      - name: Build iOS app for simulator
        run: |
          cd example/ios
          xcodebuild \
            -workspace ThermalExample.xcworkspace \
            -scheme ThermalExample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            -quiet \
            build

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[] | .value[] | select(.name == "iPhone 16") | .udid' \
            | head -1)
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Launch app to warm XCTest driver
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: |
          xcrun simctl launch booted org.reactjs.native.example.ThermalExample || true
          sleep 5

      - name: Install app on simulator
        run: |
          APP_PATH=$(find example/ios/build -name "ThermalExample.app" -type d | head -1)
          xcrun simctl install booted "$APP_PATH"

      - name: Start Metro
        run: cd example && bun start &

      - name: Wait for Metro
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081/status && break
            sleep 2
          done

      - name: Pre-warm bundle
        run: curl -sf "http://localhost:8081/index.bundle?platform=ios&dev=true" > /dev/null

      - name: Run Maestro tests
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: |
          cd example
          maestro test .maestro/ --env APP_ID=org.reactjs.native.example.ThermalExample

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-screenshots
          path: |
            ~/.maestro/tests/**/*.png
            ~/.maestro/tests/**/*.mp4

  maestro-android:
    name: Maestro (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bun --cwd packages/react-native-nitro-thermal run typescript

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'example/android/gradle-wrapper.properties') }}

      - name: Build Android APK
        run: cd example/android && ./gradlew assembleDebug -q

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb install example/android/app/build/outputs/apk/debug/app-debug.apk
            adb reverse tcp:8081 tcp:8081
            cd example && bun start &
            for i in $(seq 1 30); do curl -sf http://localhost:8081/status && break; sleep 2; done
            curl -sf "http://localhost:8081/index.bundle?platform=android&dev=true" > /dev/null
            maestro test example/.maestro/ --env APP_ID=com.thermalexample
            TEST_EXIT=$?
            kill $(lsof -ti:8081) 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-screenshots
          path: |
            ~/.maestro/tests/**/*.png
            ~/.maestro/tests/**/*.mp4
